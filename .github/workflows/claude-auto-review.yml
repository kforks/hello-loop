# .github/workflows/claude-auto-review.yml
name: Claude Auto Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot]"
          prompt: |
            Review this pull request against the Forked Software conventions in CLAUDE.md.
            Focus on: TypeScript strictness, lean dependencies (flag any new package and
            whether it's justified), Tailwind usage, how it renders on mobile, and whether
            any unnecessary infra/auth/backend was introduced.
            Post concise feedback with specific file/line references and end with a clear
            verdict — "looks good to merge" or a short list of what to change.
            Keep it tight and punchy; no filler.
