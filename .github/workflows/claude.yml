# .github/workflows/claude.yml
# Your interactive "AI employee" inside GitHub.
# Triggers when you @claude in an issue/PR comment, or open/label an issue.
# Claude can answer questions, review, and IMPLEMENT changes (open a PR for a feature).
#
# Easiest setup: in your terminal run `claude` then `/install-github-app` — it installs
# the GitHub app and stores the auth secret for you. This file is the customized workflow;
# you can let /install-github-app create its default and then swap in this one.
#
# Auth: CLAUDE_CODE_OAUTH_TOKEN uses your Claude subscription (Pro/Max). Alternatively
# uncomment anthropic_api_key for pay-as-you-go API billing.

name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
